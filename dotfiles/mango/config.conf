
# --- Main Workground binds
bind=SUPER,Return,spawn,kitty
bind=SUPER,b,spawn,vivaldi
bind=SUPER,q,killclient,
bind=SUPER,v,spawn,rofi -show drun
bind=SUPER+SHIFT,R,reload_config

# --- Scratchpads
windowrule=appid:Spotify,isnamedscratchpad:1
bind=SUPER,s,toggle_named_scratchpad,Spotify,scratch-spotify,spotify

# --- Post Launch
exec-once=quickshell
exec-once= swaybg -i ~/.config/hypr/assets/nord.jpg -m fill
exec-once=dunst
exec-once=lxsession

# --- Display: 1080p, 165, positioned at origin
monitorrule=name:DP-2,width:1920,height:1080,refresh:165,x:0,y:0,scale:1,rr:0,vrr:0
borderpx=1

# --- Graphic Optimization & Wallpapers
blur_optimized=1

# --- Focus movement (change which window is focused) ---
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# --- Swap window with neighbor in direction ---
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# --- Move floating windows (arrow-based, per docs' smartmovewin) ---
bind=SUPER+CTRL,h,smartmovewin,left
bind=SUPER+CTRL,l,smartmovewin,right
bind=SUPER+CTRL,k,smartmovewin,up
bind=SUPER+CTRL,j,smartmovewin,down

# --- Tag switching (Mango's "workspaces") ---
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# --- Move focused window to a tag ---
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# --- Cycle tags left/right ---
bind=SUPER,bracketleft,viewtoleft
bind=SUPER,bracketright,viewtoright

# --- Monitor focus (if you add a second display later) ---
bind=SUPER+ALT,h,focusmon,left
bind=SUPER+ALT,l,focusmon,right